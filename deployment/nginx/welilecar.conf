# 1. HTTP to HTTPS Redirection Block (Cloudflare Edge fallback)
server {
    listen 80;
    listen [::]:80;
    server_name welilecar.com api.welilecar.com;
    return 301 https://$host$request_uri;
}

# 2. Frontend Gateway Block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name welilecar.com;

    # SSL Certificates (Managed via Certbot)
    ssl_certificate /etc/letsencrypt/live/welilecar.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/welilecar.com/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security Headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Allow fetching from the api subdomain
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.welilecar.com;" always;

    location / {
        root /var/www/welilecar/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

# 3. API Secure Gateway Block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.welilecar.com;

    ssl_certificate /etc/letsencrypt/live/api.welilecar.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.welilecar.com/privkey.pem;

    location / {
        # The docker-compose backend is exposed on port 3005 on the host
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Propagate Host and real client IP (populated via Nginx real IP module)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Inject Cloudflare's dynamic connecting header to backend
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        
        proxy_hide_header X-Powered-By;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
